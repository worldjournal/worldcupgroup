<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #C8102E; --dark: #1a1a2e; --mid: #2d2d44; --gold: #D4AF37;
    --light: #f5f5f0; --border: #e0ddd5; --text: #1a1a1a; --muted: #888;
    --fox: #003087; --fs1: #1a6b3c;
  }
  body { font-family: 'Noto Sans TC', sans-serif; background: #f8f7f3; color: var(--text); padding: 12px; }

  .wc-widget { max-width: 720px; background: #fff; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.07); }

  /* 頁首 */
  .wc-header { background: var(--dark); color: #fff; padding: 14px 18px 12px; display: flex; align-items: center; justify-content: space-between; }
  .wc-header-left { display: flex; align-items: center; gap: 10px; }
  .wc-trophy { font-size: 22px; filter: drop-shadow(0 0 6px rgba(212,175,55,.6)); }
  .wc-title { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 700; letter-spacing: .04em; }
  .wc-subtitle { font-size: 10px; color: rgba(255,255,255,.5); margin-top: 2px; }

  /* 日期選擇器 */
  .date-bar { background: var(--mid); overflow-x: auto; scrollbar-width: none; display: flex; border-bottom: 2px solid var(--red); }
  .date-bar::-webkit-scrollbar { display: none; }
  .date-btn { flex: 0 0 auto; padding: 8px 12px; cursor: pointer; border: none; background: none; color: rgba(255,255,255,.5); font-family: inherit; font-size: 11px; font-weight: 700; text-align: center; white-space: nowrap; transition: color .2s; line-height: 1.4; }
  .date-btn:hover { color: #fff; }
  .date-btn.active { color: var(--gold); border-bottom: 2px solid var(--gold); margin-bottom: -2px; }
  .date-btn.today { color: #fff; }
  .date-btn .day-num { font-size: 14px; display: block; }
  .date-btn .day-name { font-size: 9px; opacity: .7; }

  /* 賽程列表 */
  .matches { padding: 8px 0; }
  .match-row { display: flex; align-items: center; padding: 10px 14px; border-bottom: 1px solid #f0ede8; gap: 10px; }
  .match-row:last-child { border-bottom: none; }
  .match-row:hover { background: #fdfcf8; }

  .match-time { font-size: 13px; font-weight: 700; color: var(--dark); min-width: 52px; }
  .match-teams { flex: 1; }
  .match-teams .teams { font-size: 14px; font-weight: 500; }
  .match-teams .meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .match-group { font-size: 10px; font-weight: 700; color: var(--muted); background: var(--light); padding: 2px 6px; border-radius: 2px; white-space: nowrap; }

  .match-tv { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .tv-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 2px; white-space: nowrap; }
  .tv-FOX { background: #003087; color: #fff; }
  .tv-FS1 { background: #c8102e; color: #fff; }
  .tv-Telemundo { background: #7b2d8b; color: #fff; }

  .no-matches { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; }

  /* 圖例 */
  .wc-legend { display: flex; gap: 12px; padding: 10px 14px; background: var(--light); border-top: 1px solid var(--border); flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }

  /* 今天指示 */
  .today-label { background: var(--gold); color: var(--dark); font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 2px; margin-left: 4px; }
</style>

const DAYS_ZH = ["日","一","二","三","四","五","六"];

function buildDateBar() {
  const dates = [...new Set(MATCHES.map(m => m.date))].sort();
  const today = new Date().toISOString().slice(0,10);
  const bar = document.getElementById("dateBar");

  dates.forEach(d => {
    const dt = new Date(d + "T12:00:00");
    const btn = document.createElement("button");
    btn.className = "date-btn" + (d === today ? " today" : "");
    btn.innerHTML = `<span class="day-num">${dt.getMonth()+1}/${dt.getDate()}</span><span class="day-name">週${DAYS_ZH[dt.getDay()]}</span>`;
    btn.onclick = () => showDate(d);
    btn.dataset.date = d;
    bar.appendChild(btn);
  });

  // 預設顯示今天，若賽事未開始顯示第一天
  const target = dates.includes(today) ? today : dates[0];
  showDate(target);
}

function showDate(date) {
  document.querySelectorAll(".date-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.date === date);
  });

  const matches = MATCHES.filter(m => m.date === date);
  const list = document.getElementById("matchList");

  if (!matches.length) {
    list.innerHTML = `<div class="no-matches">本日無賽事</div>`;
    return;
  }

  list.innerHTML = matches.map(m => `
    <div class="match-row">
      <div class="match-time">${m.time}</div>
      <div class="match-teams">
        <div class="teams">${zh(m.home)} vs ${zh(m.away)}</div>
        <div class="meta">${vz(m.venue)}</div>
      </div>
      <div class="match-group">${m.group}組</div>
      <div class="match-tv">
        ${m.tv.map(t => `<span class="tv-badge tv-${t.replace(' ','')}">${t}</span>`).join("")}
      </div>
    </div>
  `).join("");

  // 自動捲動到選中的日期按鈕
  const activeBtn = document.querySelector(`.date-btn[data-date="${date}"]`);
  if (activeBtn) activeBtn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
}
